name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: priority
    attributes:
      label: Priority (your assessment)
      options:
        - P0 — Critical / Blocking
        - P1 — Important
        - P2 — Nice to have
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Security
        - Payments / IPN
        - Authentication / OAuth
        - Admin panel
        - User / Agent / Merchant portal
        - API
        - Documentation
        - Performance
        - Other
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the current situation and its limitations.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Describe what you'd like to see implemented.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: false
