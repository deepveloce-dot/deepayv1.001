name: Deploy to Production

# Triggers: push to main, manual dispatch, or webhook (repository_dispatch with event "deploy")
on:
  push:
    branches:
      - main
  workflow_dispatch:
  repository_dispatch:
    types: [deploy]

permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Build frontend & deploy via SSH
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build React / Vite frontend ─────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Verify build artifacts
        run: |
          test -d dist          || { echo "dist/ not found"; exit 1; }
          test -f manifest.json || { echo "manifest.json not found"; exit 1; }
          test -f sw.js         || { echo "sw.js not found"; exit 1; }

      # ── 3. Install SSH key ──────────────────────────────────────────────────
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          known_hosts: unnecessary
          if_key_exists: replace

      - name: Add server to known_hosts
        run: ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      # ── 4. Server: git reset FIRST (so rsync below is not overwritten) ──────
      - name: Server — git reset to latest main
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch --quiet origin main
            git reset --hard origin/main
            git clean -fd --quiet

      # ── 5. Rsync dist/ AFTER git reset (so it is not overwritten) ──────────
      - name: Sync dist/ to server
        run: |
          for attempt in 1 2 3; do
            rsync -az --delete \
              dist/ \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/dist/" \
              && break \
              || { echo "rsync dist/ attempt $attempt failed — retrying in 10s..."; sleep 10; }
          done

      - name: Sync assets/ to server
        run: |
          for attempt in 1 2 3; do
            rsync -az --delete \
              assets/ \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/assets/" \
              && break \
              || { echo "rsync assets/ attempt $attempt failed — retrying in 10s..."; sleep 10; }
          done

      - name: Sync manifest.json and sw.js to server root
        run: |
          for attempt in 1 2 3; do
            rsync -az \
              manifest.json sw.js \
              "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}/" \
              && break \
              || { echo "rsync root files attempt $attempt failed — retrying in 10s..."; sleep 10; }
          done

      # ── 6. Run server-side deploy script (composer, migrate, cache) ─────────
      - name: Server — run deploy script
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"

            # Ensure deploy script is executable
            chmod +x deploy/deploy.sh

            # Run deploy with retries
            for attempt in 1 2 3; do
              bash deploy/deploy.sh --skip-cache && break || {
                echo "Deploy attempt $attempt failed — retrying in 15s..."
                sleep 15
              }
            done

            # Rebuild caches after all assets are in place
            php index.php artisan config:cache  2>/dev/null || true
            php index.php artisan route:cache   2>/dev/null || true
            php index.php artisan view:cache    2>/dev/null || true

      # ── 7. Smoke tests ──────────────────────────────────────────────────────
      - name: Smoke-test — homepage returns 200 or 302
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            --max-time 15 \
            "https://${{ secrets.DEPLOY_HOST }}/")
          echo "Homepage status: $STATUS"
          [[ "$STATUS" == "200" || "$STATUS" == "302" ]] || \
            { echo "ERROR: Homepage returned $STATUS"; exit 1; }

      - name: Smoke-test — manifest.json returns 200
        run: |
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" \
            --max-time 10 \
            "https://${{ secrets.DEPLOY_HOST }}/manifest.json")
          echo "manifest.json status: $STATUS"
          [[ "$STATUS" == "200" ]] || \
            { echo "WARNING: /manifest.json returned $STATUS"; }
